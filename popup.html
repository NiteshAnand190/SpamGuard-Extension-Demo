<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; padding: 15px; font-family: sans-serif; text-align: center; }
    .switch-container { margin-top: 15px; }
    button {
      padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;
    }
    .on { background: #28a745; color: white; }
    .off { background: #dc3545; color: white; }
    h3 { margin: 0 0 10px 0; }
  </style>
</head>
<body>
  <h3>SpamGuard AI</h3>
  <div id="status">Active</div>
  <div class="switch-container">
    <button id="toggleBtn" class="on">Turn OFF</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
